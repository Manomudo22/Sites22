<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de PDF com IA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f0f0ec;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .card {
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    padding: 2rem;
    width: 100%;
    max-width: 620px;
  }
  .header { margin-bottom: 1.5rem; }
  .header h1 { font-size: 21px; font-weight: 700; color: #111; margin-bottom: 4px; }
  .header p { font-size: 14px; color: #888; }

  .section { margin-bottom: 1.25rem; }
  .section label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }

  .upload-zone {
    border: 2px dashed #d8d8d0; border-radius: 12px;
    padding: 1.75rem 1.5rem; text-align: center;
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
    background: #fafaf8; position: relative;
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: #aaa; background: #f2f2ec; }
  .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-zone .icon { font-size: 28px; margin-bottom: 8px; }
  .upload-zone p { font-size: 14px; color: #777; }
  .upload-zone strong { color: #222; }
  .upload-zone small { font-size: 12px; color: #bbb; display: block; margin-top: 3px; }

  .file-chip {
    display: none; align-items: center; gap: 10px;
    background: #f5f5f0; border: 1.5px solid #e8e8e0;
    border-radius: 10px; padding: 10px 14px; margin-top: 8px;
  }
  .chip-name { font-size: 14px; font-weight: 600; color: #111; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip-size { font-size: 12px; color: #aaa; white-space: nowrap; }
  .chip-remove { cursor: pointer; font-size: 16px; color: #ccc; background: none; border: none; padding: 0 2px; transition: color 0.15s; }
  .chip-remove:hover { color: #555; }

  textarea {
    width: 100%; min-height: 88px; resize: vertical;
    padding: 10px 12px; font-size: 14px; font-family: inherit;
    border: 1.5px solid #e0e0d8; border-radius: 10px;
    background: #fafaf8; color: #111; outline: none;
    transition: border-color 0.15s; line-height: 1.6;
  }
  textarea:focus { border-color: #999; background: #fff; }
  textarea::placeholder { color: #ccc; }

  .chips-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .chip-btn {
    font-size: 12px; padding: 5px 12px;
    border: 1.5px solid #e8e8e0; border-radius: 99px;
    background: #f5f5f0; color: #555; cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .chip-btn:hover { background: #eaeae4; color: #111; }

  .run-btn {
    width: 100%; padding: 13px; font-size: 15px; font-weight: 700;
    background: #111; color: #fff; border: none; border-radius: 12px;
    cursor: pointer; transition: opacity 0.15s; margin-top: 0.25rem;
  }
  .run-btn:hover:not(:disabled) { opacity: 0.82; }
  .run-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .status-card {
    margin-top: 1.25rem; background: #f5f5f0;
    border: 1.5px solid #e8e8e0; border-radius: 12px;
    padding: 14px 16px; display: none;
  }
  .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .spinner {
    width: 18px; height: 18px; border: 2.5px solid #ddd;
    border-top-color: #111; border-radius: 50%;
    animation: spin 0.75s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-msg { font-size: 13px; color: #666; }
  .progress-track { height: 4px; background: #e8e8e0; border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: #111; border-radius: 99px; width: 0; transition: width 0.5s ease; }

  .result-card {
    margin-top: 1rem; background: #fff;
    border: 1.5px solid #e0e0d8; border-radius: 14px;
    overflow: hidden; display: none;
  }
  .result-header {
    padding: 12px 16px; border-bottom: 1.5px solid #f0f0e8;
    display: flex; align-items: center; gap: 8px; background: #fafaf8;
  }
  .result-badge { font-size: 11px; padding: 3px 10px; background: #e6f4ea; color: #1e7e34; border-radius: 99px; font-weight: 600; }
  .result-fname { font-size: 13px; font-weight: 600; color: #111; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .result-body { padding: 14px 16px; }
  .result-preview {
    font-size: 13px; color: #555; line-height: 1.75;
    max-height: 200px; overflow-y: auto; white-space: pre-wrap;
    word-break: break-word; background: #f9f9f6;
    border-radius: 8px; padding: 10px 12px; margin-bottom: 14px;
    border: 1px solid #eeeee8;
  }
  .download-btn {
    width: 100%; padding: 11px; font-size: 14px; font-weight: 600;
    background: #fff; color: #111; border: 1.5px solid #d8d8d0;
    border-radius: 10px; cursor: pointer; transition: background 0.15s;
    text-decoration: none; display: block; text-align: center;
  }
  .download-btn:hover { background: #f5f5f0; }

  .error-box {
    margin-top: 1rem; padding: 12px 14px; font-size: 13px; line-height: 1.6;
    background: #fff2f2; color: #c0392b;
    border-radius: 10px; border: 1.5px solid #f5c6c6; display: none;
  }
  .reset-btn {
    margin-top: 10px; width: 100%; padding: 10px;
    font-size: 13px; color: #777; background: transparent;
    border: 1.5px solid #e8e8e0; border-radius: 10px;
    cursor: pointer; transition: background 0.15s; display: none;
  }
  .reset-btn:hover { background: #f5f5f0; color: #333; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>🤖 Editor de PDF com IA</h1>
    <p>Envie um PDF, diga o que a IA deve fazer e baixe o resultado</p>
  </div>

  <div class="section">
    <label>📄 Arquivo PDF</label>
    <div class="upload-zone" id="dropzone">
      <input type="file" id="fileInput" accept=".pdf" />
      <div class="icon">📂</div>
      <p><strong>Clique para selecionar</strong> ou arraste aqui</p>
      <small>Somente arquivos .pdf</small>
    </div>
    <div class="file-chip" id="fileChip">
      <span style="font-size:20px">📄</span>
      <span class="chip-name" id="chipName"></span>
      <span class="chip-size" id="chipSize"></span>
      <button class="chip-remove" id="removeFile">✕</button>
    </div>
  </div>

  <div class="section">
    <label>✏️ O que a IA deve fazer?</label>
    <textarea id="instruction" placeholder="Ex: Responda todas as questões do PDF&#10;Ex: Faça um resumo&#10;Ex: Corrija os erros de português&#10;Ex: Traduza para inglês"></textarea>
    <div class="chips-row">
      <button class="chip-btn" onclick="setQ('Responda todas as questões do PDF com respostas detalhadas e numeradas')">Responder questões</button>
      <button class="chip-btn" onclick="setQ('Faça um resumo completo do conteúdo em tópicos')">Resumir</button>
      <button class="chip-btn" onclick="setQ('Corrija todos os erros gramaticais e ortográficos')">Corrigir erros</button>
      <button class="chip-btn" onclick="setQ('Traduza todo o conteúdo para o inglês')">Traduzir</button>
      <button class="chip-btn" onclick="setQ('Explique cada conceito com mais detalhes e exemplos práticos')">Expandir</button>
    </div>
  </div>

  <button class="run-btn" id="runBtn" disabled onclick="runAI()">Processar PDF com IA</button>

  <div class="status-card" id="statusCard">
    <div class="status-row">
      <div class="spinner"></div>
      <div class="status-msg" id="statusMsg">Iniciando...</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <span class="result-fname" id="resultFname"></span>
      <span class="result-badge">✓ Pronto</span>
    </div>
    <div class="result-body">
      <div class="result-preview" id="resultPreview"></div>
      <a id="downloadLink" href="#" download class="download-btn">⬇ Baixar PDF editado</a>
    </div>
  </div>

  <button class="reset-btn" id="resetBtn" onclick="resetAll()">↩ Processar outro PDF</button>
</div>

<script>
const pdfjsLib = window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfFile = null, origName = '';

const fileInput = document.getElementById('fileInput');
const dropzone  = document.getElementById('dropzone');
const runBtn    = document.getElementById('runBtn');
const instrEl   = document.getElementById('instruction');

fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => {
  e.preventDefault(); dropzone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') handleFile(f);
  else alert('Por favor, envie apenas arquivos .pdf');
});
document.getElementById('removeFile').addEventListener('click', () => {
  pdfFile = null; fileInput.value = '';
  document.getElementById('fileChip').style.display = 'none';
  dropzone.style.display = '';
  check();
});
instrEl.addEventListener('input', check);

function handleFile(f) {
  pdfFile = f;
  origName = f.name.replace(/\.pdf$/i, '');
  document.getElementById('chipName').textContent = f.name;
  document.getElementById('chipSize').textContent = fmtSize(f.size);
  document.getElementById('fileChip').style.display = 'flex';
  dropzone.style.display = 'none';
  check();
}

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return Math.round(b/1024) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

function check() {
  runBtn.disabled = !(pdfFile && instrEl.value.trim());
}

function setQ(txt) { instrEl.value = txt; check(); }

function setStatus(msg, pct) {
  document.getElementById('statusMsg').textContent = msg;
  if (pct !== undefined) document.getElementById('progressFill').style.width = pct + '%';
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
}

async function extractText(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let full = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const c = await page.getTextContent();
    full += `\n--- Página ${i} ---\n` + c.items.map(x => x.str).join(' ') + '\n';
  }
  return { text: full, pages: pdf.numPages };
}

async function callBackend(pdfText, instruction) {
  const res = await fetch('/api/processar', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pdfText, instruction })
  });

  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `Erro HTTP ${res.status}`);
  return data.result;
}

function buildPDF(text, title) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
  const margin = 18;
  const pw = doc.internal.pageSize.getWidth();
  const ph = doc.internal.pageSize.getHeight();
  const maxW = pw - margin * 2;
  let y = margin + 8;

  doc.setFillColor(240, 240, 236);
  doc.rect(0, 0, pw, 30, 'F');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.setTextColor(20, 20, 20);
  doc.text(title + ' — Editado pela IA', margin, 19);
  y = 38;

  doc.setDrawColor(210, 210, 200);
  doc.setLineWidth(0.3);
  doc.line(margin, y - 2, pw - margin, y - 2);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(55, 55, 55);

  for (const raw of text.split('\n')) {
    const wrapped = doc.splitTextToSize(raw || ' ', maxW);
    for (const wl of wrapped) {
      if (y + 6 > ph - margin) {
        doc.addPage();
        y = margin + 4;
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(10);
        doc.setTextColor(55, 55, 55);
      }
      const isH = /^(---|\d+[\.\)]\s|#{1,3}\s)/i.test(wl.trim());
      doc.setFont('helvetica', isH ? 'bold' : 'normal');
      doc.setTextColor(isH ? 20 : 55, isH ? 20 : 55, isH ? 20 : 55);
      doc.text(wl, margin, y);
      y += 5.5;
    }
  }

  const total = doc.internal.getNumberOfPages();
  for (let p = 1; p <= total; p++) {
    doc.setPage(p);
    doc.setFont('helvetica', 'italic');
    doc.setFontSize(8);
    doc.setTextColor(180, 180, 180);
    doc.text(`Gerado por IA · Página ${p} de ${total}`, pw / 2, ph - 8, { align: 'center' });
  }

  return doc.output('blob');
}

async function runAI() {
  const instruction = instrEl.value.trim();
  if (!pdfFile || !instruction) return;

  document.getElementById('statusCard').style.display = 'block';
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'none';
  runBtn.disabled = true;

  try {
    setStatus('Lendo o PDF...', 10);
    const { text, pages } = await extractText(pdfFile);
    if (!text.trim()) throw new Error('Não foi possível extrair texto. O PDF pode ser uma imagem escaneada.');

    setStatus(`PDF lido — ${pages} página(s). Enviando para a IA...`, 35);
    const aiText = await callBackend(text, instruction);
    if (!aiText) throw new Error('A IA não retornou resposta. Tente novamente.');

    setStatus('Gerando o PDF editado...', 85);
    const blob = buildPDF(aiText, origName);
    const url = URL.createObjectURL(blob);

    setStatus('Concluído! ✓', 100);

    document.getElementById('resultFname').textContent = origName + '_editado.pdf';
    document.getElementById('resultPreview').textContent = aiText.length > 700 ? aiText.slice(0, 700) + '\n...' : aiText;
    const dl = document.getElementById('downloadLink');
    dl.href = url;
    dl.download = origName + '_editado.pdf';
    document.getElementById('resultCard').style.display = 'block';
    document.getElementById('resetBtn').style.display = 'block';
    setTimeout(() => { document.getElementById('statusCard').style.display = 'none'; }, 1200);

  } catch(err) {
    document.getElementById('statusCard').style.display = 'none';
    showError(err.message);
    runBtn.disabled = false;
    check();
  }
}

function resetAll() {
  pdfFile = null; origName = '';
  fileInput.value = '';
  document.getElementById('fileChip').style.display = 'none';
  dropzone.style.display = '';
  instrEl.value = '';
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('statusCard').style.display = 'none';
  check();
}
</script>
</body>
</html>
